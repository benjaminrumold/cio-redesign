<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Therapeutensuche | Christen in der Osteopathie</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
  <style>
    :root {
      --blue: #1a1a5e;
      --blue-dark: #12123e;
      --blue-light: #e8e8f4;
      --rose: #9e2a5e;
      --rose-light: #f5e8ef;
      --gray-50: #f8f9fa;
      --gray-100: #f1f3f5;
      --gray-200: #e9ecef;
      --gray-300: #dee2e6;
      --gray-400: #ced4da;
      --gray-500: #adb5bd;
      --gray-600: #868e96;
      --gray-700: #495057;
      --gray-800: #212529;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'DM Sans', -apple-system, sans-serif;
      background: #fff;
      color: var(--gray-800);
      min-height: 100vh;
    }
    .header {
      background: var(--blue);
      padding: 18px 24px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .header img { height: 46px; }

    .main {
      display: grid;
      grid-template-columns: 340px 1fr;
      min-height: calc(100vh - 82px);
    }

    /* ===== MAP PANEL ===== */
    .map-panel {
      background: var(--gray-50);
      border-right: 1px solid var(--gray-200);
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
    }
    .map-panel h2 {
      font-family: 'DM Serif Display', serif;
      font-size: 1.3rem;
      color: var(--blue);
      margin-bottom: 4px;
      text-align: center;
    }
    .map-panel .map-subtitle {
      font-size: 0.82rem;
      color: var(--gray-500);
      margin-bottom: 16px;
      text-align: center;
    }
    .map-container {
      width: 100%;
      max-width: 300px;
      position: relative;
    }
    .map-container svg {
      width: 100%;
      height: auto;
    }
    .map-dot {
      cursor: pointer;
      transition: r 0.15s, fill 0.15s;
    }
    .map-dot:hover {
      r: 7;
      fill: var(--rose);
    }
    .map-dot.active {
      r: 8;
      fill: var(--rose);
      stroke: #fff;
      stroke-width: 2;
    }
    .map-tooltip {
      position: absolute;
      background: var(--blue);
      color: #fff;
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 0.78rem;
      font-weight: 600;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
      white-space: nowrap;
      z-index: 10;
      transform: translate(-50%, -100%);
      margin-top: -10px;
    }
    .map-tooltip.show { opacity: 1; }
    .map-legend {
      margin-top: 16px;
      width: 100%;
      max-width: 280px;
    }
    .map-legend-title {
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--gray-500);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }
    .map-city-list {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }
    .map-city-btn {
      background: #fff;
      border: 1px solid var(--gray-200);
      border-radius: 6px;
      padding: 3px 9px;
      font-size: 0.72rem;
      color: var(--gray-600);
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
    }
    .map-city-btn:hover {
      border-color: var(--blue);
      color: var(--blue);
    }
    .map-city-btn.active {
      background: var(--blue);
      color: #fff;
      border-color: var(--blue);
    }
    .map-city-btn .count {
      font-weight: 700;
    }

    /* ===== SEARCH PANEL ===== */
    .search-panel {
      padding: 32px 32px 48px;
    }
    .search-bar {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
      max-width: 600px;
    }
    .search-bar input {
      flex: 1;
      padding: 13px 18px;
      border: 2px solid var(--gray-200);
      border-radius: 12px;
      font-size: 0.95rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }
    .search-bar input:focus { border-color: var(--blue); }
    .search-bar button {
      padding: 13px 22px;
      background: var(--blue);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.2s;
      white-space: nowrap;
    }
    .search-bar button:hover { background: var(--blue-dark); }
    .search-bar .btn-reset {
      background: var(--gray-100);
      color: var(--gray-600);
      font-weight: 500;
    }
    .search-bar .btn-reset:hover { background: var(--gray-200); }

    .stats {
      font-size: 0.88rem;
      color: var(--gray-500);
      margin-bottom: 20px;
    }
    .stats strong { color: var(--gray-700); }

    .results {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 14px;
    }
    .card {
      background: #fff;
      border: 1px solid var(--gray-200);
      border-radius: 12px;
      padding: 18px;
      transition: box-shadow 0.2s, transform 0.15s, border-color 0.2s;
    }
    .card:hover {
      box-shadow: 0 4px 20px rgba(0,0,0,0.07);
      transform: translateY(-2px);
    }
    .card.highlight {
      border-color: var(--rose);
      box-shadow: 0 0 0 1px var(--rose), 0 4px 16px rgba(158,42,94,0.1);
    }
    .card-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 8px;
    }
    .card-name {
      font-weight: 700;
      font-size: 1rem;
      color: var(--gray-800);
    }
    .card-badge {
      background: var(--blue-light);
      color: var(--blue);
      font-size: 0.7rem;
      font-weight: 700;
      padding: 4px 9px;
      border-radius: 20px;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .card-qual { font-size: 0.82rem; color: var(--gray-500); margin-bottom: 7px; }
    .card-praxis { font-size: 0.88rem; color: var(--gray-600); font-weight: 500; margin-bottom: 2px; }
    .card-addr { font-size: 0.82rem; color: var(--gray-500); margin-bottom: 12px; }
    .card-links { display: flex; flex-wrap: wrap; gap: 6px; }
    .card-links a {
      font-size: 0.78rem;
      color: var(--blue);
      text-decoration: none;
      padding: 4px 10px;
      border: 1px solid var(--blue-light);
      border-radius: 6px;
      transition: background 0.15s;
    }
    .card-links a:hover { background: var(--blue-light); }

    .no-results {
      text-align: center;
      padding: 48px 20px;
      color: var(--gray-500);
      grid-column: 1 / -1;
    }
    .no-results strong { display: block; font-size: 1.05rem; color: var(--gray-700); margin-bottom: 6px; }

    .footer {
      text-align: center;
      padding: 20px;
      color: var(--gray-400);
      font-size: 0.78rem;
      border-top: 1px solid var(--gray-100);
    }

    @media (max-width: 860px) {
      .main {
        grid-template-columns: 1fr;
      }
      .map-panel {
        position: relative;
        height: auto;
        border-right: none;
        border-bottom: 1px solid var(--gray-200);
        padding: 20px 16px;
      }
      .map-container { max-width: 220px; }
      .search-panel { padding: 24px 16px 40px; }
      .search-bar { flex-direction: column; }
      .results { grid-template-columns: 1fr; }
    }
  </style>
</head>

// Draw map dots
var dotsG = document.getElementById('map-dots');
var drawnCities = {};
Object.keys(cityGroups).forEach(function(city) {
  var coords = cityCoords[city];
  if (!coords) return;
  if (drawnCities[coords[0]+','+coords[1]]) return;
  drawnCities[coords[0]+','+coords[1]] = true;
  var count = cityGroups[city].length;
  var r = Math.min(4 + count, 8);
  var circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
  circle.setAttribute('cx', coords[0]);
  circle.setAttribute('cy', coords[1]);
  circle.setAttribute('r', r);
  circle.setAttribute('fill', '#1a1a5e');
  circle.setAttribute('class', 'map-dot');
  circle.setAttribute('data-city', city);
  circle.addEventListener('click', function() { filterByCity(city); });
  circle.addEventListener('mouseenter', function(ev) { showTooltip(ev, city, count); });
  circle.addEventListener('mouseleave', hideTooltip);
  dotsG.appendChild(circle);
});

// Build city buttons
var cityBtns = document.getElementById('city-btns');
var sortedCities = Object.keys(cityGroups).sort();
sortedCities.forEach(function(city) {
  var btn = document.createElement('button');
  btn.className = 'map-city-btn';
  btn.setAttribute('data-city', city);
  btn.innerHTML = city + ' <span class="count">(' + cityGroups[city].length + ')</span>';
  btn.onclick = function() { filterByCity(city); };
  cityBtns.appendChild(btn);
});

function showTooltip(ev, city, count) {
  var tip = document.getElementById('tooltip');
  var svg = document.querySelector('.map-container svg');
  var rect = svg.getBoundingClientRect();
  var circle = ev.target;
  var cx = parseFloat(circle.getAttribute('cx'));
  var cy = parseFloat(circle.getAttribute('cy'));
  var scaleX = rect.width / 380;
  var scaleY = rect.height / 480;
  tip.textContent = city + ' (' + count + ')';
  tip.style.left = (cx * scaleX) + 'px';
  tip.style.top = (cy * scaleY - 8) + 'px';
  tip.classList.add('show');
}
function hideTooltip() {
  document.getElementById('tooltip').classList.remove('show');
}

function filterByCity(city) {
  if (activeCity === city) {
    activeCity = null;
    document.getElementById('q').value = '';
  } else {
    activeCity = city;
    document.getElementById('q').value = city;
  }
  updateMapHighlight();
  doSearch();
}

function updateMapHighlight() {
  document.querySelectorAll('.map-dot').forEach(function(d) {
    d.classList.toggle('active', d.getAttribute('data-city') === activeCity);
  });
  document.querySelectorAll('.map-city-btn').forEach(function(b) {
    b.classList.toggle('active', b.getAttribute('data-city') === activeCity);
  });
}

function resetSearch() {
  activeCity = null;
  document.getElementById('q').value = '';
  updateMapHighlight();
  doSearch();
}

function doSearch() {
  var v = document.getElementById('q').value.trim().toLowerCase();
  var r = T;
  if (v) {
    r = T.filter(function(t) {
      return t.name.toLowerCase().indexOf(v) !== -1 ||
             t.plz.toLowerCase().startsWith(v) ||
             t.o.toLowerCase().indexOf(v) !== -1;
    });
  }
  var s = document.getElementById('stats');
  if (v) {
    s.innerHTML = '<strong>' + r.length + ' Ergebnis' + (r.length !== 1 ? 'se' : '') + '</strong> für „' + v + '“';
  } else {
    s.innerHTML = '<strong>42 Therapeut:innen</strong> aus Deutschland, Österreich & der Schweiz';
  }
  var c = document.getElementById('res');
  if (!r.length) {
    c.innerHTML = '<div class="no-results"><strong>Keine Therapeut:innen gefunden</strong>Versuchen Sie einen anderen Namen, PLZ oder Ort.</div>';
    return;
  }
  c.innerHTML = r.map(function(t) {
    var links = '';
    if (t.tel) links += '<a href="tel:' + t.tel + '">☎ ' + t.tel + '</a>';
    if (t.e) links += '<a href="mailto:' + t.e + '">✉ E-Mail</a>';
    if (t.w) links += '<a href="https://' + t.w + '" target="_blank">↗ Website</a>';
    var hl = (activeCity && t.o === activeCity) ? ' highlight' : '';
    return '<div class="card' + hl + '">' +
      '<div class="card-head"><span class="card-name">' + t.name + '</span><span class="card-badge">' + t.plz + ' ' + t.o + '</span></div>' +
      (t.q ? '<div class="card-qual">' + t.q + '</div>' : '') +
      (t.p ? '<div class="card-praxis">' + t.p + '</div>' : '') +
      (t.s ? '<div class="card-addr">' + t.s + ', ' + t.plz + ' ' + t.o + '</div>' : '<div class="card-addr">' + t.plz + ' ' + t.o + '</div>') +
      (links ? '<div class="card-links">' + links + '</div>' : '') +
    '</div>';
  }).join('');
}

doSearch();
document.getElementById('q').addEventListener('input', function() {
  activeCity = null;
  updateMapHighlight();
  doSearch();
});
document.getElementById('q').addEventListener('keyup', function(e) {
  if (e.key === 'Enter') doSearch();
});
</script>

<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Therapeutensuche | Christen in der Osteopathie</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
  <style>
    :root {
      --blue: #1a1a5e;
      --blue-dark: #12123e;
      --blue-light: #e8e8f4;
      --rose: #9e2a5e;
      --rose-light: #f5e8ef;
      --gray-50: #f8f9fa;
      --gray-100: #f1f3f5;
      --gray-200: #e9ecef;
      --gray-300: #dee2e6;
      --gray-400: #ced4da;
      --gray-500: #adb5bd;
      --gray-600: #868e96;
      --gray-700: #495057;
      --gray-800: #212529;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'DM Sans', -apple-system, sans-serif;
      background: #fff;
      color: var(--gray-800);
      min-height: 100vh;
    }

    .header {
      background: var(--blue);
      padding: 20px 0;
      text-align: center;
    }
    .header img {
      height: 50px;
    }
    .header-fallback {
      color: #fff;
      font-family: 'DM Serif Display', serif;
      font-size: 1.4rem;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 24px;
    }

    .hero {
      text-align: center;
      padding: 56px 24px 32px;
    }
    .hero h1 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(1.8rem, 4vw, 2.6rem);
      color: var(--blue);
      margin-bottom: 12px;
      line-height: 1.2;
    }
    .hero p {
      color: var(--gray-600);
      font-size: 1.05rem;
      max-width: 560px;
      margin: 0 auto;
      line-height: 1.6;
    }

    .search-box {
      background: var(--gray-50);
      border-radius: 16px;
      padding: 32px 32px 24px;
      margin-bottom: 24px;
    }
    .search-input-wrapper {
      display: flex;
      gap: 12px;
      max-width: 500px;
      margin: 0 auto 20px;
    }
    .search-input-wrapper input {
      flex: 1;
      padding: 14px 20px;
      border: 2px solid var(--gray-200);
      border-radius: 12px;
      font-size: 1rem;
      font-family: inherit;
      transition: border-color 0.2s;
      outline: none;
    }
    .search-input-wrapper input:focus {
      border-color: var(--blue);
    }
    .search-input-wrapper button {
      padding: 14px 28px;
      background: var(--blue);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      font-family: inherit;
    }
    .search-input-wrapper button:hover {
      background: var(--blue-dark);
      transform: translateY(-1px);
    }
    .search-stats {
      text-align: center;
      font-size: 0.9rem;
      color: var(--gray-500);
    }
    .search-stats strong {
      color: var(--gray-700);
    }

    .results {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 16px;
      padding-bottom: 60px;
    }

    .card {
      background: #fff;
      border: 1px solid var(--gray-200);
      border-radius: 12px;
      padding: 20px;
      transition: box-shadow 0.2s, transform 0.15s;
    }
    .card:hover {
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      transform: translateY(-2px);
    }
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 10px;
      gap: 12px;
    }
    .card-name {
      font-weight: 700;
      color: var(--gray-800);
      font-size: 1.05rem;
    }
    .card-badge {
      background: var(--blue-light);
      color: var(--blue);
      font-size: 0.72rem;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 20px;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .card-qual {
      font-size: 0.85rem;
      color: var(--gray-500);
      margin-bottom: 8px;
    }
    .card-praxis {
      font-size: 0.9rem;
      color: var(--gray-600);
      font-weight: 500;
      margin-bottom: 3px;
    }
    .card-adresse {
      font-size: 0.85rem;
      color: var(--gray-500);
      margin-bottom: 14px;
    }
    .card-kontakt {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .card-kontakt a {
      font-size: 0.8rem;
      color: var(--blue);
      text-decoration: none;
      padding: 5px 12px;
      border: 1px solid var(--blue-light);
      border-radius: 6px;
      transition: background 0.15s;
    }
    .card-kontakt a:hover {
      background: var(--blue-light);
    }

    .no-results {
      text-align: center;
      padding: 48px 24px;
      color: var(--gray-500);
      grid-column: 1 / -1;
    }
    .no-results strong {
      display: block;
      font-size: 1.1rem;
      color: var(--gray-700);
      margin-bottom: 8px;
    }

    .footer {
      text-align: center;
      padding: 24px;
      color: var(--gray-400);
      font-size: 0.8rem;
      border-top: 1px solid var(--gray-100);
    }

    @media (max-width: 700px) {
      .search-input-wrapper { flex-direction: column; }
      .results { grid-template-columns: 1fr; }
      .search-box { padding: 24px 16px 20px; }
      .hero { padding: 40px 16px 24px; }
    }
  </style>
</head>

function search(){
  var v=document.getElementById('plz').value.trim().toLowerCase();
  var r=T;
  if(v){r=T.filter(function(t){return t.plz.toLowerCase().startsWith(v)||t.o.toLowerCase().indexOf(v)!==-1||t.name.toLowerCase().indexOf(v)!==-1});}
  var s=document.getElementById('stats');
  if(v){s.innerHTML='<strong>'+r.length+' Ergebnis'+(r.length!==1?'se':'')+'</strong> für „'+v+'“';}
  else{s.innerHTML='<strong>42 Therapeut:innen</strong> aus Deutschland, Österreich &amp; der Schweiz';}
  var c=document.getElementById('res');
  if(!r.length){c.innerHTML='<div class="no-results"><strong>Keine Therapeut:innen gefunden</strong>Versuchen Sie eine andere PLZ, einen Ortsnamen oder einen Namen.</div>';return;}
  c.innerHTML=r.map(function(t){
    var k='';
    if(t.tel)k+='<a href="tel:'+t.tel+'">☎ '+t.tel+'</a>';
    if(t.e)k+='<a href="mailto:'+t.e+'">✉ E-Mail</a>';
    if(t.w)k+='<a href="https://'+t.w+'" target="_blank">↗ Website</a>';
    return '<div class="card">'+
      '<div class="card-header"><span class="card-name">'+t.name+'</span><span class="card-badge">'+t.plz+' '+t.o+'</span></div>'+
      (t.q?'<div class="card-qual">'+t.q+'</div>':'')+
      (t.p?'<div class="card-praxis">'+t.p+'</div>':'')+
      (t.s?'<div class="card-adresse">'+t.s+', '+t.plz+' '+t.o+'</div>':'<div class="card-adresse">'+t.plz+' '+t.o+'</div>')+
      (k?'<div class="card-kontakt">'+k+'</div>':'')+
    '</div>';
  }).join('');
}
search();
document.getElementById('plz').addEventListener('input',search);
document.getElementById('plz').addEventListener('keyup',function(e){if(e.key==='Enter')search();});
</script>
